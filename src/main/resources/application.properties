spring.application.name=budgeting
server.port=${PORT:8080}
spring.ai.openai.api-key=${OPENAI_API_KEY:}

spring.docker.compose.skip.in-tests=false

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:transaction}
spring.datasource.username=${POSTGRES_USER:app}
spring.datasource.password=${POSTGRES_PASSWORD:app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.ai.openai.chat.options.model=gpt-4o-mini

ai.interpret.rate-limit.requests-per-minute=20
ai.interpret.timeout=20s
ai.interpret.min-prompt-length=3
ai.interpret.max-prompt-length=4000
ai.interpret.system-prompt=classpath:/prompts/interpretation-system-message.st

auth.password-reset.reset-base-url=${PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}
auth.password-reset.token-ttl=${PASSWORD_RESET_TOKEN_TTL:30m}
resend.api-key=${RESEND_API_KEY:}
resend.sender=${RESEND_SENDER:no-reply@mail.budgeting.online}
resend.base-url=${RESEND_BASE_URL:https://api.resend.com}

spring.ai.model.audio.transcription=openai
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.language=es
spring.ai.openai.audio.transcription.options.temperature=0
spring.ai.openai.audio.transcription.options.response-format=text
spring.ai.openai.audio.transcription.options.prompt=El audio está en español. \
  El audio suele describir gastos personales con valores en pesos argentinos, acciones como gasté o pagué, y comercios o establecimientos.

spring.ai.model.audio.speech=openai
spring.ai.openai.audio.speech.options.model=gpt-4o-mini-tts
spring.ai.openai.audio.speech.options.voice=nova
spring.ai.openai.audio.speech.options.speed=1.2
spring.ai.openai.audio.speech.options.response-format=mp3
