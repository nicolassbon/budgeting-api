services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-transaction}
    ports:
      - "5432:5432"
    volumes:
      - transaction_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-transaction}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      database:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POSTGRES_HOST: database
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-transaction}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_SENDER: ${RESEND_SENDER:-}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-}
      PASSWORD_RESET_TOKEN_TTL: ${PASSWORD_RESET_TOKEN_TTL:-}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  transaction_data:
